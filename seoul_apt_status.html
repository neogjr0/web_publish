
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0d0d0f; --card: #16161f; --neon: #00e5ff; --purple: #8a2be2; --text: #e8e8f0; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* 상단 요약 카드 */
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .s-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .s-card small { color: #6b6b80; display: block; margin-bottom: 5px; }
        .s-card div { font-size: 22px; font-weight: bold; color: var(--neon); }

        /* 구별 탭 */
        .tab-wrap { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 25px; justify-content: center; }
        .tab { padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; background: #1a1a24; color: #6b6b80; font-size: 13px; transition: 0.3s; }
        .tab.active { border-color: var(--neon); color: var(--neon); background: rgba(0,229,255,0.1); }

        /* 차트 영역 */
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
        .chart-card h3 { font-size: 16px; margin-top: 0; color: var(--neon); border-left: 4px solid var(--neon); padding-left: 10px; }

        /* 상세 리스트 */
        .list-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .rank-item { display: grid; grid-template-columns: 40px 1fr 100px; padding: 15px; border-bottom: 1px solid var(--border); text-decoration: none; color: inherit; align-items: center; }
        .rank-item:hover { background: rgba(255,255,255,0.03); }
        .price { color: var(--neon); font-weight: bold; text-align: right; }
    </style>
</head>

    let topChart, areaChart;

    function update(code, el) {
        // 탭 활성화
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        
        const info = allData[code];
        
        // 요약 수치 업데이트
        document.getElementById('m-p').innerText = (info.summary.max_price/10000).toFixed(1) + '억';
        document.getElementById('a-p').innerText = (info.summary.avg_price/10000).toFixed(1) + '억';
        document.getElementById('cnt').innerText = info.summary.count + '건';

        // 차트 업데이트
        if(topChart) topChart.destroy();
        if(areaChart) areaChart.destroy();

        topChart = new Chart(document.getElementById('topChart'), {
            type: 'bar',
            data: {
                labels: info.ranking.slice(0,7).map(r => r.aptNm),
                datasets: [{ label: '억', data: info.ranking.slice(0,7).map(r => r.price_int/10000), backgroundColor: 'rgba(138, 43, 226, 0.6)', borderRadius: 5, indexAxis: 'y' }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });

        areaChart = new Chart(document.getElementById('areaChart'), {
            type: 'bar',
            data: {
                labels: Object.keys(info.area_stats),
                datasets: [{ label: '건', data: Object.values(info.area_stats), backgroundColor: 'rgba(0, 229, 255, 0.6)', borderRadius: 5 }]

        btn.onclick = () => update(code, btn);

    });
    update(Object.keys(allData)[0], tabs.firstChild);
